<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarePulse - Patient Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="auth-guard.js"></script>
    <script src="api.js"></script>
    <div class="dashboard-wrapper">
        <!-- Top Navigation Bar -->
        <nav class="top-navbar">
            <div class="navbar-left">
                <img src="images/logo.png" alt="CarePulse Logo" class="navbar-logo">
                <span class="navbar-title">CarePulse AI</span>
            </div>
            <div class="navbar-center">
                <span class="hospital-name" id="hospitalName"></span>
            </div>
            <div class="navbar-right">
                <button class="logout-btn" id="logoutBtn" title="Logout">
                    <span>🚪</span>
                </button>
            </div>
        </nav>

        <div class="dashboard-layout">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-link">
                        <span class="nav-icon">📊</span>
                        <span class="nav-label">Dashboard</span>
                    </a>
                    <a href="patients.html" class="nav-link active">
                        <span class="nav-icon">👥</span>
                        <span class="nav-label">Patients</span>
                    </a>
                    <a href="add-patient.html" class="nav-link">
                        <span class="nav-icon">➕</span>
                        <span class="nav-label">Add Patient</span>
                    </a>
                    <a href="medication.html" class="nav-link">
                        <span class="nav-icon">💊</span>
                        <span class="nav-label">Medications</span>
                    </a>
                    <a href="reminders.html" class="nav-link">
                        <span class="nav-icon">🔔</span>
                        <span class="nav-label">Reminders</span>
                    </a>
                    <a href="messages.html" class="nav-link">
                        <span class="nav-icon">💬</span>
                        <span class="nav-label">Messages</span>
                    </a>
                    <a href="analytics.html" class="nav-link">
                        <span class="nav-icon">📈</span>
                        <span class="nav-label">Analytics</span>
                    </a>
                    <a href="reminders.html" class="nav-link">
                        <span class="nav-icon">🔔</span>
                        <span class="nav-label">Reminders</span>
                    </a>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Page Header -->
                <section class="page-header">
                    <div class="header-left">
                        <h1>Patient Register</h1>
                        <span class="patient-count-badge" id="patientCountBadge">50 Patients</span>
                    </div>
                    <button class="action-btn" id="btnAddPatient">➕ Add New Patient</button>
                </section>

                <!-- Filter Bar -->
                <section class="filter-bar">
                    <div class="filter-group">
                        <label for="filterDisease">Disease:</label>
                        <select id="filterDisease" class="filter-select">
                            <option value="">All Diseases</option>
                            <option value="Hypertension">Hypertension</option>
                            <option value="Diabetes Type 2">Diabetes Type 2</option>
                            <option value="Hypertension & Diabetes">Both</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="filterAdherence">Adherence:</label>
                        <select id="filterAdherence" class="filter-select">
                            <option value="">All Status</option>
                            <option value="On Track">On Track (≥80%)</option>
                            <option value="At Risk">At Risk (50-79%)</option>
                            <option value="Non-Adherent">Non-Adherent (<50%)</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <input 
                            type="text" 
                            id="searchPatient" 
                            class="search-input" 
                            placeholder="Search by patient name..."
                        >
                    </div>

                    <button class="reset-btn" id="btnReset">🔄 Reset Filters</button>
                </section>

                <!-- Patient Table -->
                <section class="table-section">
                    <div class="table-wrapper">
                        <table class="patient-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Age</th>
                                    <th>Disease</th>
                                    <th>Phone</th>
                                    <th>Last Reminder</th>
                                    <th>Next Appointment</th>
                                    <th>Adherence</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="patientTableBody">
                                <!-- Rows populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Pagination -->
                <section class="pagination-section">
                    <div class="pagination-info" id="paginationInfo">
                        Showing 1–10 of 50
                    </div>
                    <div class="pagination-controls">
                        <button class="pagination-btn" id="btnPrev" disabled>← Previous</button>
                        <span class="pagination-page" id="pageIndicator">Page 1 of 5</span>
                        <button class="pagination-btn" id="btnNext">Next →</button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="mockData.js"></script>
    <script src="patients.js"></script>
</body>
</html>
