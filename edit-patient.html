<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarePulse - Edit Patient</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="auth-guard.js"></script>
    <script src="api.js"></script>
    <div class="dashboard-wrapper">
        <nav class="top-navbar">
            <div class="navbar-left">
                <img src="images/logo.png" alt="CarePulse Logo" class="navbar-logo">
                <span class="navbar-title">CarePulse AI</span>
            </div>
            <div class="navbar-center">
                <span class="hospital-name" id="hospitalName"></span>
            </div>
            <div class="navbar-right">
                <button class="logout-btn" id="logoutBtn" title="Logout"><span>🚪</span></button>
            </div>
        </nav>
        <div class="dashboard-layout">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
                    <a href="patients.html" class="nav-link active"><span class="nav-icon">👥</span><span class="nav-label">Patients</span></a>
                    <a href="add-patient.html" class="nav-link"><span class="nav-icon">➕</span><span class="nav-label">Add Patient</span></a>
                    <a href="medication.html" class="nav-link"><span class="nav-icon">💊</span><span class="nav-label">Medications</span></a>
                    <a href="reminders.html" class="nav-link"><span class="nav-icon">🔔</span><span class="nav-label">Reminders</span></a>
                    <a href="messages.html" class="nav-link"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
                    <a href="reports.html" class="nav-link"><span class="nav-icon">📈</span><span class="nav-label">Reports</span></a>
                    <a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span><span class="nav-label">Settings</span></a>
                </nav>
            </aside>
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <h1>Edit Patient</h1>
                        <p class="patient-subtitle" id="patientSubtitle">Loading...</p>
                    </div>
                </div>

                <form id="editForm" class="registration-form">
                    <section class="form-section">
                        <h2 class="section-title">🏥 Clinical Details</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="primaryDiagnosis">Primary Diagnosis <span class="required">*</span></label>
                                <select id="primaryDiagnosis" name="primaryDiagnosis" class="form-input">
                                    <option value="Hypertension">Hypertension</option>
                                    <option value="Diabetes Type 2">Diabetes Type 2</option>
                                    <option value="Hypertension & Diabetes">Both</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="secondaryCondition">Secondary Conditions <span class="optional">(Optional)</span></label>
                                <input type="text" id="secondaryCondition" class="form-input" placeholder="e.g. Asthma, Arthritis">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="clinicianName">Treating Clinician <span class="required">*</span></label>
                                <input type="text" id="clinicianName" class="form-input" placeholder="Enter clinician name">
                            </div>
                            <div class="form-group">
                                <label for="ward">Ward / Clinic <span class="required">*</span></label>
                                <input type="text" id="ward" class="form-input" placeholder="e.g. Cardiology, Ward A">
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2 class="section-title">📱 Contact & Preferences</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="phone">Phone Number <span class="required">*</span></label>
                                <input type="tel" id="phone" class="form-input" placeholder="+2348XXXXXXXXX">
                            </div>
                            <div class="form-group">
                                <label for="preferredLanguage">Preferred Language</label>
                                <select id="preferredLanguage" class="form-input">
                                    <option value="English">English</option>
                                    <option value="Pidgin English">Pidgin English</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="preferredChannel">Reminder Delivery</label>
                                <select id="preferredChannel" class="form-input">
                                    <option value="SMS">SMS Text Message</option>
                                    <option value="VOICE">Voice Call (Coming Soon)</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2 class="section-title">📅 Next Appointment</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="nextAppointmentDate">Appointment Date</label>
                                <input type="date" id="nextAppointmentDate" class="form-input">
                            </div>
                            <div class="form-group">
                                <label for="nextAppointmentLocation">Location / Department</label>
                                <input type="text" id="nextAppointmentLocation" class="form-input" placeholder="e.g. Cardiology Ward">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Appointment Reminders</label>
                                <div class="checkbox-group-vertical">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="apptReminderThreeDays" class="checkbox-input" checked>
                                        <span>3 days before appointment</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="apptReminderMorning" class="checkbox-input" checked>
                                        <span>Morning of appointment</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </section>
                </form>

                <section class="form-buttons">
                    <button type="button" class="btn-secondary" id="btnCancel">← Cancel</button>
                    <button type="button" class="btn-primary" id="btnSave">✓ Save Changes</button>
                </section>
            </main>
        </div>
    </div>
    <div class="toast" id="toast"><span id="toastMessage"></span></div>
    <script src="mockData.js"></script>
    <script src="edit-patient.js"></script>
</body>
</html>
